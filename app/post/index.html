<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <base data-auto-base href="" />
    <script>
      (function (b) {
        try {
          b.href = new URL(".", location.href).href;
        } catch (e) {
          b.href = "./";
        }
      })(document.querySelector("base[data-auto-base]"));
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" href="../../assets/favicon.svg" type="image/svg+xml" />
    <title>SEO DEMO</title>
    <link rel="preconnect" href="https://cdn.jsdelivr.net" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css"
    />
    <link rel="stylesheet" href="../../assets/css/styles.css" />
    <script src="../../assets/js/site-config.js"></script>
    <script defer src="../../assets/js/app-data.js"></script>
  </head>
  <body>
    <header class="site-header">
      <div class="wrap inner">
        <a class="brand" href="../../index.html">
          <span class="brand-mark" aria-hidden="true">
            <svg class="icon icon-lg"><use href="../../assets/icons.svg#i-spark" /></svg>
          </span>
          <span>SEO DEMO</span>
        </a>
        <nav class="nav">
          <a class="btn btn-ghost btn-sm" href="../board/index.html">
            <svg class="icon"><use href="../../assets/icons.svg#i-chat" /></svg>
            목록
          </a>
        </nav>
      </div>
    </header>

    <main class="wrap post-detail">
      <div id="gone" class="empty" style="display: none">게시글을 찾을 수 없습니다.</div>
      <div id="main" style="display: none">
        <div class="head">
          <a class="btn btn-ghost btn-sm" href="../board/index.html">
            <svg class="icon flip-h" aria-hidden="true"><use href="../../assets/icons.svg#i-arrow" /></svg>
            목록으로
          </a>
          <div id="ownerActions" style="display: none; gap: 8px; flex-wrap: wrap"></div>
        </div>
        <h1 id="title"></h1>
        <p class="muted" id="meta" style="margin: 0 0 18px"></p>
        <div class="prose" id="body"></div>

        <section class="comments" aria-label="댓글">
          <h2>
            <svg class="icon" style="vertical-align: -0.12em" aria-hidden="true"><use href="../../assets/icons.svg#i-chat" /></svg>
            댓글
          </h2>
          <div id="clist"></div>
          <form id="cf" method="post" action="#" style="margin-top: 14px">
            <div class="field" style="margin-bottom: 10px">
              <label for="ct" class="sr-only">댓글 입력</label>
              <textarea class="textarea" id="ct" placeholder="댓글을 입력하세요" style="min-height: 88px"></textarea>
            </div>
            <button class="btn btn-primary btn-sm" type="submit">
              <svg class="icon"><use href="../../assets/icons.svg#i-add" /></svg>
              댓글 등록
            </button>
          </form>
        </section>
      </div>
    </main>

    <div class="modal-backdrop" id="emodal" role="dialog" aria-modal="true" aria-labelledby="etitle">
      <div class="modal">
        <h2 id="etitle">글 수정</h2>
        <div id="emsg" class="msg" role="alert"></div>
        <form id="ef" method="post" action="#">
          <div class="field">
            <label for="et">제목</label>
            <input class="input" id="et" required />
          </div>
          <div class="field">
            <label for="eb">내용</label>
            <textarea class="textarea" id="eb" required></textarea>
          </div>
          <div class="row-between" style="margin-top: 4px">
            <button type="button" class="btn btn-ghost btn-sm" id="eclose">취소</button>
            <button type="submit" class="btn btn-primary btn-sm">저장</button>
          </div>
        </form>
      </div>
    </div>

    <script>
      document.addEventListener("DOMContentLoaded", async function () {
        try {
          await AppData.init();
        } catch (err) {
          console.error(err);
        }
        var ICONS = "../../assets/icons.svg";
        var user = await AppData.requireSession();
        if (!user) {
          window.location.href = "../../auth/login/index.html";
          return;
        }
        var id = new URLSearchParams(location.search).get("id");
        if (!id) {
          window.location.href = "../board/index.html";
          return;
        }
        var post = await AppData.getPost(id);
        if (!post) {
          document.getElementById("gone").style.display = "block";
          return;
        }

        function fmt(ts) {
          try {
            return new Date(ts).toLocaleString("ko-KR");
          } catch (x) {
            return "";
          }
        }

        function escapeHtml(s) {
          return String(s)
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;")
            .replace(/"/g, "&quot;");
        }

        var main = document.getElementById("main");
        main.style.display = "block";
        document.getElementById("title").textContent = post.title;
        document.getElementById("meta").textContent =
          (await AppData.displayName(post.authorId)) + " · 수정: " + fmt(post.updatedAt);
        document.getElementById("body").textContent = post.body;

        var isOwner = post.authorId === user.id;
        var oa = document.getElementById("ownerActions");
        if (isOwner) {
          oa.style.display = "flex";
          oa.setAttribute("aria-label", "내 글 작업");
          oa.innerHTML =
            '<button type="button" class="btn btn-sm" id="editBtn"><svg class="icon"><use href="' +
            ICONS +
            '#i-edit"/></svg>수정</button>' +
            '<button type="button" class="btn btn-danger btn-sm" id="delBtn"><svg class="icon"><use href="' +
            ICONS +
            '#i-trash"/></svg>삭제</button>';
        }

        var emodal = document.getElementById("emodal");
        var emsg = document.getElementById("emsg");

        function openE() {
          emsg.className = "msg";
          document.getElementById("et").value = post.title;
          document.getElementById("eb").value = post.body;
          emodal.classList.add("show");
        }
        function closeE() {
          emodal.classList.remove("show");
        }
        if (isOwner) {
          document.getElementById("editBtn").addEventListener("click", openE);
          document.getElementById("delBtn").addEventListener("click", async function () {
            if (!confirm("이 글과 댓글을 모두 삭제할까요?")) return;
            try {
              await AppData.deletePost(user.id, post.id);
              window.location.href = "../board/index.html";
            } catch (err) {
              alert(err.message);
            }
          });
          document.getElementById("eclose").addEventListener("click", closeE);
          emodal.addEventListener("click", function (e) {
            if (e.target === emodal) closeE();
          });
          document.getElementById("ef").addEventListener("submit", async function (e) {
            e.preventDefault();
            emsg.className = "msg";
            try {
              await AppData.upsertPost(user.id, {
                id: post.id,
                title: document.getElementById("et").value,
                body: document.getElementById("eb").value,
              });
              post = await AppData.getPost(post.id);
              document.getElementById("title").textContent = post.title;
              document.getElementById("body").textContent = post.body;
              document.getElementById("meta").textContent =
                (await AppData.displayName(post.authorId)) + " · 수정: " + fmt(post.updatedAt);
              closeE();
            } catch (err) {
              emsg.textContent = err.message || "저장 실패";
              emsg.className = "msg show err";
            }
          });
        }

        async function renderComments() {
          var box = document.getElementById("clist");
          var cs = await AppData.getComments(post.id);
          if (!cs.length) {
            box.innerHTML = '<p class="muted" style="margin: 0">아직 댓글이 없습니다.</p>';
            return;
          }
          var chunks = [];
          for (var i = 0; i < cs.length; i++) {
            var c = cs[i];
            var mine = c.authorId === user.id;
            var dn = await AppData.displayName(c.authorId);
            var actions = mine
              ? '<div class="c-actions">' +
                '<button type="button" class="btn btn-sm" data-act="ec" data-cid="' +
                c.id +
                '"><svg class="icon"><use href="' +
                ICONS +
                '#i-edit"/></svg>수정</button>' +
                '<button type="button" class="btn btn-danger btn-sm" data-act="dc" data-cid="' +
                c.id +
                '"><svg class="icon"><use href="' +
                ICONS +
                '#i-trash"/></svg>삭제</button></div>'
              : "";
            chunks.push(
              '<div class="comment" data-cid="' +
                c.id +
                '"><div class="c-meta">' +
                escapeHtml(dn) +
                " · " +
                fmt(c.updatedAt || c.createdAt) +
                "</div><div class=\"cbody\">" +
                escapeHtml(c.body).replace(/\n/g, "<br/>") +
                "</div>" +
                actions +
                "</div>"
            );
          }
          box.innerHTML = chunks.join("");

          box.querySelectorAll('[data-act="dc"]').forEach(function (btn) {
            btn.addEventListener("click", async function () {
              var cid = btn.getAttribute("data-cid");
              if (!confirm("댓글을 삭제할까요?")) return;
              try {
                await AppData.deleteComment(user.id, cid);
                await renderComments();
              } catch (err) {
                alert(err.message);
              }
            });
          });
          box.querySelectorAll('[data-act="ec"]').forEach(function (btn) {
            btn.addEventListener("click", async function () {
              var cid = btn.getAttribute("data-cid");
              var cs2 = await AppData.getComments(post.id);
              var cur = cs2.find(function (x) {
                return x.id === cid;
              });
              if (!cur) return;
              var nv = prompt("댓글 수정", cur.body);
              if (nv == null) return;
              try {
                await AppData.updateComment(user.id, cid, nv);
                await renderComments();
              } catch (err) {
                alert(err.message);
              }
            });
          });
        }

        document.getElementById("cf").addEventListener("submit", async function (e) {
          e.preventDefault();
          var t = document.getElementById("ct").value;
          if (!t.trim()) return;
          try {
            await AppData.addComment(user.id, post.id, t);
            document.getElementById("ct").value = "";
            await renderComments();
          } catch (err) {
            alert(err.message);
          }
        });

        await renderComments();
      });
    </script>
  </body>
</html>
