<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <base data-auto-base href="" />
    <script>
      (function (b) {
        try {
          b.href = new URL(".", location.href).href;
        } catch (e) {
          b.href = "./";
        }
      })(document.querySelector("base[data-auto-base]"));
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>로그인 · Demo Service</title>
    <link rel="preconnect" href="https://cdn.jsdelivr.net" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css"
    />
    <link rel="stylesheet" href="../../assets/css/styles.css" />
    <script src="../../assets/js/site-config.js"></script>
    <script defer src="../../assets/js/app-data.js"></script>
  </head>
  <body>
    <header class="site-header">
      <div class="wrap inner">
        <a class="brand" href="../../index.html">
          <span class="brand-mark" aria-hidden="true">
            <svg class="icon icon-lg"><use href="../../assets/icons.svg#i-spark" /></svg>
          </span>
          <span>Demo Service</span>
        </a>
        <nav class="nav">
          <a class="btn btn-ghost btn-sm" href="../../index.html">
            <svg class="icon"><use href="../../assets/icons.svg#i-home" /></svg>
            홈
          </a>
        </nav>
      </div>
    </header>

    <main class="auth-shell">
      <div class="auth-card">
        <h1>
          <svg class="icon" aria-hidden="true"><use href="../../assets/icons.svg#i-lock" /></svg>
          로그인
        </h1>
        <p class="hint">체험 계정으로 로그인하면 커뮤니티 보드로 이동합니다.</p>
        <div id="msg" class="msg" role="alert"></div>
        <form id="loginForm" method="post" action="#">
          <div class="field">
            <label for="login">아이디 또는 이메일</label>
            <input class="input" id="login" autocomplete="username" required />
          </div>
          <div class="field">
            <label for="password">비밀번호</label>
            <input class="input" id="password" type="password" autocomplete="current-password" required />
          </div>
          <div class="stack">
            <button class="btn btn-primary" type="submit">
              <svg class="icon"><use href="../../assets/icons.svg#i-arrow" /></svg>
              로그인하고 보드로 이동
            </button>
          </div>
        </form>
        <div class="row-between" style="margin-top: 18px">
          <div class="links-inline">
            <a href="../find-id/index.html">
              <svg class="icon" style="width: 1em; height: 1em"><use href="../../assets/icons.svg#i-search" /></svg>
              아이디 찾기
            </a>
            <a href="../find-password/index.html">
              <svg class="icon" style="width: 1em; height: 1em"><use href="../../assets/icons.svg#i-key" /></svg>
              비밀번호 찾기
            </a>
            <a href="../signup/index.html">
              <svg class="icon" style="width: 1em; height: 1em"><use href="../../assets/icons.svg#i-user-plus" /></svg>
              회원가입
            </a>
          </div>
        </div>
      </div>
    </main>

    <script>
      document.addEventListener("DOMContentLoaded", async function () {
        if (location.search) {
          history.replaceState(null, "", location.pathname + location.hash);
        }
        try {
          await AppData.init();
        } catch (err) {
          console.error(err);
        }
        if (window.AppData && (await AppData.getSession())) {
          window.location.href = "../../app/board/index.html";
          return;
        }
        var msg = document.getElementById("msg");
        function showErr(t) {
          msg.textContent = t;
          msg.className = "msg show err";
        }
        document.getElementById("loginForm").addEventListener("submit", async function (e) {
          e.preventDefault();
          msg.className = "msg";
          try {
            var u = await AppData.verifyLogin(document.getElementById("login").value, document.getElementById("password").value);
            await AppData.setSession(u);
            window.location.href = "../../app/board/index.html";
          } catch (err) {
            showErr(err.message || "로그인에 실패했습니다.");
          }
        });
      });
    </script>
  </body>
</html>
