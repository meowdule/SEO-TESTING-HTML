<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <base data-auto-base href="" />
    <script>
      (function (b) {
        try {
          b.href = new URL(".", location.href).href;
        } catch (e) {
          b.href = "./";
        }
      })(document.querySelector("base[data-auto-base]"));
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>비밀번호 찾기 · Demo Service</title>
    <link rel="preconnect" href="https://cdn.jsdelivr.net" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css"
    />
    <link rel="stylesheet" href="../../assets/css/styles.css" />
    <script src="../../assets/js/site-config.js"></script>
    <script defer src="../../assets/js/app-data.js"></script>
  </head>
  <body>
    <header class="site-header">
      <div class="wrap inner">
        <a class="brand" href="../../index.html">
          <span class="brand-mark" aria-hidden="true">
            <svg class="icon icon-lg"><use href="../../assets/icons.svg#i-spark" /></svg>
          </span>
          <span>Demo Service</span>
        </a>
        <nav class="nav">
          <a class="btn btn-ghost btn-sm" href="../login/index.html">로그인</a>
        </nav>
      </div>
    </header>

    <main class="auth-shell">
      <div class="auth-card">
        <h1>
          <svg class="icon" aria-hidden="true"><use href="../../assets/icons.svg#i-key" /></svg>
          비밀번호 재설정
        </h1>
        <p class="hint" id="fp-hint">
          로컬 모드: 이메일·아이디가 일치하면 이 브라우저에서 바로 새 비밀번호로 갱신됩니다. Supabase 연결 시: 이메일로 재설정 링크가 발송됩니다.
        </p>
        <div id="msg" class="msg" role="alert"></div>
        <form id="f">
          <div class="field">
            <label for="email">이메일</label>
            <input class="input" id="email" type="email" required autocomplete="email" />
          </div>
          <div class="field" id="fp-local-user">
            <label for="username">아이디</label>
            <input class="input" id="username" required autocomplete="username" />
          </div>
          <div class="field" id="fp-local-pw">
            <label for="np">새 비밀번호 (4자 이상)</label>
            <input class="input" id="np" type="password" autocomplete="new-password" required minlength="4" />
          </div>
          <button class="btn btn-primary" type="submit">
            <svg class="icon"><use href="../../assets/icons.svg#i-lock" /></svg>
            비밀번호 변경
          </button>
        </form>
        <p class="hint" style="margin-top: 18px; margin-bottom: 0">
          <a href="../login/index.html" style="color: #c4b5fd; text-decoration: underline">로그인으로 돌아가기</a>
        </p>
      </div>
    </main>

    <script>
      document.addEventListener("DOMContentLoaded", async function () {
        await AppData.init();
        if (AppData.isRemote()) {
          document.getElementById("fp-local-user").style.display = "none";
          document.getElementById("fp-local-pw").style.display = "none";
          document.getElementById("username").removeAttribute("required");
          document.getElementById("np").removeAttribute("required");
          document.getElementById("fp-hint").textContent =
            "Supabase 연결 모드: 가입 시 사용한 이메일로 재설정 링크를 보냅니다. (아이디·즉시 변경 필드는 사용하지 않습니다.)";
        }
        var msg = document.getElementById("msg");
        document.getElementById("f").addEventListener("submit", async function (e) {
          e.preventDefault();
          msg.className = "msg";
          try {
            await AppData.resetPassword(
              document.getElementById("email").value,
              document.getElementById("username").value,
              document.getElementById("np").value
            );
            msg.className = "msg show ok";
            msg.textContent = AppData.isRemote()
              ? "재설정 메일을 보냈습니다. 메일함을 확인한 뒤 링크로 새 비밀번호를 설정해 주세요."
              : "비밀번호가 변경되었습니다. 로그인해 주세요.";
            e.target.reset();
          } catch (err) {
            msg.textContent = err.message || "처리에 실패했습니다.";
            msg.className = "msg show err";
          }
        });
      });
    </script>
  </body>
</html>
