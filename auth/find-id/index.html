<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <base data-auto-base href="" />
    <script>
      (function (b) {
        try {
          b.href = new URL(".", location.href).href;
        } catch (e) {
          b.href = "./";
        }
      })(document.querySelector("base[data-auto-base]"));
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>아이디 찾기 · Demo Service</title>
    <link rel="preconnect" href="https://cdn.jsdelivr.net" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css"
    />
    <link rel="stylesheet" href="../../assets/css/styles.css" />
    <script src="../../assets/js/site-config.js"></script>
    <script defer src="../../assets/js/app-data.js"></script>
  </head>
  <body>
    <header class="site-header">
      <div class="wrap inner">
        <a class="brand" href="../../index.html">
          <span class="brand-mark" aria-hidden="true">
            <svg class="icon icon-lg"><use href="../../assets/icons.svg#i-spark" /></svg>
          </span>
          <span>Demo Service</span>
        </a>
        <nav class="nav">
          <a class="btn btn-ghost btn-sm" href="../login/index.html">로그인</a>
        </nav>
      </div>
    </header>

    <main class="auth-shell">
      <div class="auth-card">
        <h1>
          <svg class="icon" aria-hidden="true"><use href="../../assets/icons.svg#i-search" /></svg>
          아이디 찾기
        </h1>
        <p class="hint">가입 시 사용한 이메일로 등록된 아이디를 찾습니다.</p>
        <div id="msg" class="msg" role="status"></div>
        <form id="f" method="post" action="#">
          <div class="field">
            <label for="email">이메일</label>
            <input class="input" id="email" type="email" required autocomplete="email" />
          </div>
          <button class="btn btn-primary" type="submit">
            <svg class="icon"><use href="../../assets/icons.svg#i-search" /></svg>
            아이디 조회
          </button>
        </form>
        <p class="hint" style="margin-top: 18px; margin-bottom: 0">
          <a href="../login/index.html" style="color: #c4b5fd; text-decoration: underline">로그인으로 돌아가기</a>
        </p>
      </div>
    </main>

    <script>
      document.addEventListener("DOMContentLoaded", async function () {
        try {
          await AppData.init();
        } catch (err) {
          console.error(err);
        }
        var msg = document.getElementById("msg");
        document.getElementById("f").addEventListener("submit", async function (e) {
          e.preventDefault();
          var email = document.getElementById("email").value.trim();
          var u = await AppData.findUserByEmail(email);
          if (!u) {
            msg.className = "msg show err";
            msg.textContent = "해당 이메일로 가입된 계정을 찾을 수 없습니다.";
            return;
          }
          msg.className = "msg show ok";
          msg.textContent = "회원님의 아이디는 「" + u.username + "」 입니다.";
        });
      });
    </script>
  </body>
</html>
