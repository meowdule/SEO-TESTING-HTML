<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <base data-auto-base href="" />
    <script>
      (function (b) {
        try {
          b.href = new URL(".", location.href).href;
        } catch (e) {
          b.href = "./";
        }
      })(document.querySelector("base[data-auto-base]"));
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" href="../../assets/favicon.svg" type="image/svg+xml" />
    <title>SEO DEMO</title>
    <link rel="preconnect" href="https://cdn.jsdelivr.net" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css"
    />
    <link rel="stylesheet" href="../../assets/css/styles.css" />
    <script src="../../assets/js/site-config.js"></script>
    <script defer src="../../assets/js/app-data.js"></script>
  </head>
  <body>
    <header class="site-header">
      <div class="wrap inner">
        <a class="brand" href="../../index.html">
          <span class="brand-mark" aria-hidden="true">
            <svg class="icon icon-lg"><use href="../../assets/icons.svg#i-spark" /></svg>
          </span>
          <span>SEO DEMO</span>
        </a>
        <nav class="nav">
          <a class="btn btn-ghost btn-sm" href="../../index.html">
            <svg class="icon"><use href="../../assets/icons.svg#i-home" /></svg>
            홈
          </a>
        </nav>
      </div>
    </header>

    <main class="auth-shell">
      <div class="auth-card">
        <h1>
          <svg class="icon" aria-hidden="true"><use href="../../assets/icons.svg#i-mail" /></svg>
          문의하기
        </h1>
        <p class="hint" id="hintContact">문의 내용은 이 브라우저의 localStorage에만 기록됩니다.</p>
        <div id="msg" class="msg" role="status"></div>
        <form id="f" method="post" action="#">
          <div class="field">
            <label for="name">이름</label>
            <input class="input" id="name" name="name" required autocomplete="name" />
          </div>
          <div class="field">
            <label for="email">이메일</label>
            <input class="input" id="email" name="email" type="email" required autocomplete="email" />
          </div>
          <div class="field">
            <label for="topic">주제</label>
            <select class="input" id="topic" name="topic">
              <option>제품 문의</option>
              <option>가격 / 견적</option>
              <option>기술 지원</option>
              <option>기타</option>
            </select>
          </div>
          <div class="field">
            <label for="body">내용</label>
            <textarea class="textarea" id="body" name="body" required></textarea>
          </div>
          <div class="stack">
            <button class="btn btn-primary" type="submit">
              <svg class="icon"><use href="../../assets/icons.svg#i-send" /></svg>
              제출하기
            </button>
          </div>
        </form>
      </div>
    </main>

    <script>
      document.addEventListener("DOMContentLoaded", async function () {
        try {
          await AppData.init();
        } catch (e) {
          console.error(e);
        }
        var hint = document.getElementById("hintContact");
        if (AppData.isRemote()) {
          hint.textContent = "Supabase에 연결된 경우 문의는 서버에 저장되며, 관리자가 커뮤니티 보드에서 확인할 수 있습니다.";
        }
        var msg = document.getElementById("msg");
        document.getElementById("f").addEventListener("submit", async function (e) {
          e.preventDefault();
          msg.className = "msg";
          try {
            await AppData.submitContactInquiry({
              name: document.getElementById("name").value,
              email: document.getElementById("email").value,
              topic: document.getElementById("topic").value,
              body: document.getElementById("body").value,
            });
            msg.textContent = AppData.isRemote()
              ? "문의가 접수되었습니다."
              : "문의가 저장되었습니다. (이 PC 브라우저에만 보관)";
            msg.className = "msg show ok";
            e.target.reset();
          } catch (err) {
            msg.textContent = err.message || "제출에 실패했습니다.";
            msg.className = "msg show err";
          }
        });
      });
    </script>
  </body>
</html>
