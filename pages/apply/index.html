<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <base data-auto-base href="" />
    <script>
      (function (b) {
        try {
          b.href = new URL(".", location.href).href;
        } catch (e) {
          b.href = "./";
        }
      })(document.querySelector("base[data-auto-base]"));
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>지금 신청하기 · Demo Service</title>
    <link rel="preconnect" href="https://cdn.jsdelivr.net" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css"
    />
    <link rel="stylesheet" href="../../assets/css/styles.css" />
    <script src="../../assets/js/site-config.js"></script>
    <script defer src="../../assets/js/app-data.js"></script>
  </head>
  <body>
    <header class="site-header">
      <div class="wrap inner">
        <a class="brand" href="../../index.html">
          <span class="brand-mark" aria-hidden="true">
            <svg class="icon icon-lg"><use href="../../assets/icons.svg#i-spark" /></svg>
          </span>
          <span>Demo Service</span>
        </a>
        <nav class="nav">
          <a class="btn btn-ghost btn-sm" href="../../index.html">
            <svg class="icon"><use href="../../assets/icons.svg#i-home" /></svg>
            홈
          </a>
        </nav>
      </div>
    </header>

    <main class="auth-shell">
      <div class="auth-card">
        <h1>
          <svg class="icon" aria-hidden="true"><use href="../../assets/icons.svg#i-user-plus" /></svg>
          지금 신청하기
        </h1>
        <p class="hint" id="hintApply">신청서는 데모용으로 브라우저에만 저장됩니다.</p>
        <div id="msg" class="msg" role="status"></div>
        <form id="f" method="post" action="#">
          <div class="field">
            <label for="company">회사 / 팀</label>
            <input class="input" id="company" required />
          </div>
          <div class="field">
            <label for="name">담당자 이름</label>
            <input class="input" id="name" required autocomplete="name" />
          </div>
          <div class="field">
            <label for="email">이메일</label>
            <input class="input" id="email" type="email" required autocomplete="email" />
          </div>
          <div class="field">
            <label for="plan">희망 플랜</label>
            <select class="input" id="plan">
              <option>Starter</option>
              <option>Pro</option>
              <option>Team</option>
            </select>
          </div>
          <div class="field">
            <label for="note">추가 메모</label>
            <textarea class="textarea" id="note"></textarea>
          </div>
          <button class="btn btn-primary" type="submit">
            <svg class="icon"><use href="../../assets/icons.svg#i-send" /></svg>
            신청 제출
          </button>
        </form>
      </div>
    </main>

    <script>
      document.addEventListener("DOMContentLoaded", async function () {
        try {
          await AppData.init();
        } catch (e) {
          console.error(e);
        }
        var hint = document.getElementById("hintApply");
        if (AppData.isRemote()) {
          hint.textContent = "Supabase에 연결된 경우 신청은 서버에 저장되며, 관리자가 커뮤니티 보드에서 확인할 수 있습니다.";
        }
        var msg = document.getElementById("msg");
        document.getElementById("f").addEventListener("submit", async function (e) {
          e.preventDefault();
          msg.className = "msg";
          try {
            await AppData.submitApplySubmission({
              company: document.getElementById("company").value,
              name: document.getElementById("name").value,
              email: document.getElementById("email").value,
              plan: document.getElementById("plan").value,
              note: document.getElementById("note").value,
            });
            msg.textContent = AppData.isRemote() ? "신청이 접수되었습니다." : "신청이 저장되었습니다.";
            msg.className = "msg show ok";
            e.target.reset();
          } catch (err) {
            msg.textContent = err.message || "제출에 실패했습니다.";
            msg.className = "msg show err";
          }
        });
      });
    </script>
  </body>
</html>
